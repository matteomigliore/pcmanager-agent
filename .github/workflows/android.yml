name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk PCAgentSetup.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAgentSetup-apk
          path: PCAgentSetup.apk

      - name: Publish to release (android-latest, non marcata "Latest")
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view android-latest >/dev/null 2>&1; then
            gh release upload android-latest PCAgentSetup.apk --clobber
          else
            gh release create android-latest PCAgentSetup.apk \
              --title "PC Manager — App Android" \
              --notes "APK debug installabile via sideload. Vedi android/README.md per l'installazione." \
              --latest=false
          fi
